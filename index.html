<!DOCTYPE html>
<html>
<head>
    <meta name="google-site-verification" content="EDFnYjhWxKFqEBvcSIWQ7zVO6-yIvy5rIfsskvvSp8I" />
    <title>Table with Links</title>

    <style>
        body {
            font-family: Arial;
        }

        table {
            width: 60%;
            border-collapse: collapse;
            margin: 50px auto;
            text-align: center;
        }

        th, td {
            border: 2px solid black;
            padding: 15px;
        }

        th {
            background-color: lightgray;
        }

        a {
            text-decoration: none;
            color: blue;
        }

        a:hover {
            color: red;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Driving Licence</th>
            <th>Aadhaar Card Status</th>
            <th>Voter ID Application</th>
            <th>Apply for PAN Card</th>
            <th>Aadhaar Card Download</th>
        </tr>

        <tr>
            <td>
                <a href="https://parivahan.gov.in/en" target="_blank">Licence</a>
            </td>

            <td>
                <a href="https://myaadhaar.uidai.gov.in/CheckAadhaarStatus/en" target="_blank">Aadhaar Status</a>
            </td>

            <td>
                <a href="https://voters.eci.gov.in/" target="_blank">Voter ID</a>
            </td>

            <td>
                <a href="https://onlineservices.proteantech.in/paam/endUserRegisterContact.html" target="_blank">PAN Card</a>
            </td>

            <td>
                <a href="https://myaadhaar.uidai.gov.in/genricDownloadAadhaar/en" target="_blank">Download Aadhaar</a>
            </td>
        </tr>
    </table>

</body>
</html>
